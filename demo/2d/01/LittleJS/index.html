<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弾幕STG - LittleJS</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
      overflow: hidden;
      font-family: "Consolas", "Courier New", monospace;
    }
    /* 他エンジンと同じく 960x540 の固定枠に収める。
       engineInit の第7引数にこの要素を渡すと LittleJS が中に canvas を生成する。
       エンジンが margin:0 を inline で上書きするため !important で中央寄せを維持。 */
    #game-container {
      position: relative; width: 960px; height: 540px; margin: 0 auto !important;
      overflow: hidden;
    }
    /* HUD overlay drawn on top of the LittleJS canvas */
    #hud {
      background: rgba(10, 16, 22, 0.60); border-radius: 6px; padding: 5px 8px;
      position: absolute; left: 8px; top: 6px; color: #eaf2ff;
      font-size: 13px; line-height: 1.45; text-shadow: 0 0 3px #000, 0 0 3px #000;
      pointer-events: none; white-space: pre; z-index: 10;
    }
    #help {
      position: absolute; left: 0; right: 0; bottom: 6px; text-align: center;
      background: rgba(10, 16, 22, 0.45); border-radius: 6px; padding: 5px 8px; color: #8aa0ff;
      font-size: 12px; line-height: 1.4;
      text-shadow: 0 0 3px #000; pointer-events: none; z-index: 10;
    }
    #title {
      position: absolute; inset: 0; display: grid; place-items: center; text-align: center;
      color: #ffe66d; font: 700 30px/1.4 ui-monospace, monospace; text-shadow: 0 2px 8px #000;
      pointer-events: none; z-index: 11;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="hud">loading...</div>
    <div id="help">ENTER: start&#10;Move: Arrows / WASD&#10;Fire: auto&#10;Enemy max +/- : [ + ] [ - ]</div>
    <div id="title">PRESS ENTER TO START<br><span style="font-size:15px; color:#bcd">— DEMO / ATTRACT MODE —</span></div>
  </div>

  <!-- LittleJS engine via CDN. Primary: unpkg. If it fails to load, the
       jsDelivr fallback below is injected. See README for details. -->
  <script>
    window.addEventListener('error', function (e) {
      // If the primary CDN script tag failed, try the jsDelivr mirror.
      if (e && e.target && e.target.tagName === 'SCRIPT' &&
          /unpkg\.com\/littlejsengine/.test(e.target.src || '')) {
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/littlejsengine/dist/littlejs.min.js';
        s.onload = function () {
          var g = document.createElement('script');
          g.src = 'game.js';
          document.body.appendChild(g);
        };
        document.body.appendChild(s);
      }
    }, true);
  </script>
  <script src="https://unpkg.com/littlejsengine/dist/littlejs.min.js"></script>
  <script>
    // Load game.js only after LittleJS is confirmed present (primary path).
    if (window.LittleJS || window.engineInit) {
      var g = document.createElement('script');
      g.src = 'game.js';
      document.body.appendChild(g);
    }
  </script>
</body>
</html>
