<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>テーマ10 マッチ3パズル ― PixiJS v8</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0c1018;
      color: #e0e0e0;
      font-family: "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
    }
    /* three.js 版と同じ固定 960x540 のステージ。横方向は中央寄せ・上端配置。 */
    #stage {
      position: relative;
      width: 960px;
      height: 540px;
      margin: 0 auto;
      line-height: 0;
    }
    /* HUD は HTML オーバーレイ（キャンバスとは独立）。左上固定。 */
    #hud {
      background: rgba(10, 16, 22, 0.60); border-radius: 6px; padding: 5px 8px;
      position: absolute;
      left: 8px;
      top: 6px;
      margin: 0;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      line-height: 1.45;
      color: #eaf2ff;
      white-space: pre;
      pointer-events: none;
      text-shadow: 0 1px 2px #000;
    }
    #help {
      position: absolute; left: 0; right: 0; bottom: 6px; text-align: center;
      background: rgba(10, 16, 22, 0.45); border-radius: 6px; padding: 5px 8px; color: #8aa0ff;
      font-size: 12px; line-height: 1.4;
      text-shadow: 0 0 3px #000; pointer-events: none; z-index: 10;
    }
    #title {
      position: absolute; inset: 0; display: grid; place-items: center; text-align: center;
      color: #ffe66d; font: 700 30px/1.4 ui-monospace, monospace; text-shadow: 0 2px 8px #000;
      pointer-events: none; z-index: 11;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="stage">
    <div id="game"></div>
    <pre id="hud">loading...</pre>
    <div id="help">
      ENTER: start ・ クリック2回: 隣接スワップ ・ Space: オート切替 ・ + / - : 盤面サイズ N ・ R: リセット
    </div>
    <div id="title">PRESS ENTER TO START<br><span style="font-size:15px; color:#bcd">— DEMO / ATTRACT MODE —</span></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
