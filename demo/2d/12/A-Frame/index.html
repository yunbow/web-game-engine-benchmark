<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>テーマ12 フォーリングサンド / セルオートマトン ― A-Frame</title>
  <style>
    html, body {
      margin: 0; padding: 0; background: #0b0d12; height: 100%;
      overflow: hidden; font-family: "Consolas", "Courier New", monospace;
    }
    #game-container { position: relative; width: 960px; height: 540px; margin: 0 auto; }
    /* A-Frame の <a-scene embedded> は親要素を埋める。 */
    a-scene { display: block; width: 960px; height: 540px; }
    #hud {
      background: rgba(10, 16, 22, 0.60); border-radius: 6px; padding: 5px 8px;
      position: absolute; left: 8px; top: 6px; color: #eaf2ff;
      font-size: 13px; line-height: 1.45; text-shadow: 0 1px 2px #000, 0 0 3px #000;
      pointer-events: none; white-space: pre; z-index: 10;
    }
    #help {
      position: absolute; left: 0; right: 0; bottom: 6px; text-align: center;
      background: rgba(10, 16, 22, 0.45); border-radius: 6px; padding: 5px 8px; color: #8a99a8;
      font-size: 12px; line-height: 1.4;
      text-shadow: 0 0 3px #000; pointer-events: none; z-index: 10;
    }
  </style>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="game.js"></script>
</head>
<body>
  <div id="game-container">
    <!-- シーンは宣言的に記述。ゲーム本体は sand-game コンポーネントが駆動する。 -->
    <a-scene embedded background="color: #0b0d12"
             vr-mode-ui="enabled: false"
             device-orientation-permission-ui="enabled: false"
             renderer="antialias: false">
      <a-entity sand-game></a-entity>
    </a-scene>
    <div id="hud">loading...</div>
    <div id="help">左ドラッグ=描画 ・ 右ドラッグ=消去 ・ 1/2/3=砂/水/壁 ・ + / - : 解像度(COLS±40) ・ C=クリア ・ R=リセット</div>
  </div>
</body>
</html>
