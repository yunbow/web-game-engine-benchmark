<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Theme7 Physics Puzzle (投擲物理) - Babylon.js + Matter.js</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #101014;
    color: #e0e0e0;
    font-family: Consolas, "Courier New", monospace;
    overflow: hidden;
  }
  /* three.js 版と同じ固定 960x540 のステージ。横方向は中央寄せ・上端配置。 */
  #stage {
    position: relative;
    width: 960px;
    height: 540px;
    margin: 0 auto;
  }
  #renderCanvas {
    width: 960px;
    height: 540px;
    display: block;
    touch-action: none;
    outline: none;
    background: #6bb7ff;
  }
  #hud {
    background: rgba(10, 16, 22, 0.60); border-radius: 6px; padding: 5px 8px;
    position: absolute;
    top: 8px;
    left: 8px;
    color: #eaf2ff;
    font-size: 13px;
    line-height: 1.45;
    pointer-events: none;
    white-space: pre;
    z-index: 10;
  }
  #help {
    position: absolute; left: 0; right: 0; bottom: 6px; text-align: center;
    background: rgba(10, 16, 22, 0.45); border-radius: 6px; padding: 5px 8px;
    font-size: 12px;
    color: #b0b0b0;
    pointer-events: none;
    z-index: 10;
  }
  #gameover {
    position: absolute;
    top: 0; left: 0;
    width: 960px; height: 540px;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: #fff;
    background: rgba(0, 0, 0, 0.55);
    z-index: 20;
    text-align: center;
  }
  #gameover h1 { color: #f66; margin: 0 0 8px; }
  #gameover p { margin: 4px; }
  #title {
    position: absolute; inset: 0; display: grid; place-items: center; text-align: center;
    color: #ffe66d; font: 700 30px/1.4 ui-monospace, monospace; text-shadow: 0 2px 8px #000;
    pointer-events: none; z-index: 11;
  }
  .hudLabel { color: #eaf2ff; }
  .hudVal   { color: #eaf2ff; }
  .warn     { color: #eaf2ff; }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="renderCanvas" width="960" height="540"></canvas>
    <div id="hud">loading...</div>
    <div id="help">ENTER: start &nbsp; ドラッグ&amp;リリース / クリック: 発射 &nbsp; Space: オートショット &nbsp; +/-: 箱数 ±20 &nbsp; R: 再構築</div>
    <div id="title">PRESS ENTER TO START<br><span style="font-size:15px; color:#bcd">— DEMO / ATTRACT MODE —</span></div>
    <div id="gameover">
      <h1>GAME OVER</h1>
      <p id="goScore"></p>
      <p>Enter / クリックでリスタート</p>
    </div>
  </div>
  <!-- Babylon は3Dエンジンで物理(Havok/Ammo)も3D前提のため、2D剛体は matter-js を CDN 併用する。 -->
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="game.js"></script>
</body>
</html>
