<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>テーマ13 大量動的テキスト / UI描画 ― A-Frame</title>
  <style>
    html, body {
      margin: 0; padding: 0; background: #0b0d16; height: 100%;
      overflow: hidden; font-family: "Consolas", "Courier New", monospace;
    }
    #game-container { position: relative; width: 960px; height: 540px; margin: 8px auto; }
    /* A-Frame の <a-scene embedded> は親要素を埋める。 */
    a-scene { display: block; width: 960px; height: 540px; }
    canvas { display: block; }
    /* HUD は HTML オーバーレイ（キャンバスとは独立）。左上固定。
       A-Frame(three.js) 側のテキスト描画コストと HUD 更新を切り離して計測するため。 */
    #hud {
      background: rgba(10, 16, 22, 0.60); border-radius: 6px; padding: 5px 8px;
      position: absolute; left: 8px; top: 6px; color: #eaf2ff;
      font-size: 13px; line-height: 1.45; text-shadow: 0 0 3px #000, 0 0 3px #000;
      pointer-events: none; white-space: pre; z-index: 10;
    }
    #help {
      position: absolute; left: 0; right: 0; bottom: 6px; text-align: center;
      background: rgba(10, 16, 22, 0.45); border-radius: 6px; padding: 5px 8px; color: #8a99a8;
      font-size: 12px; line-height: 1.4; text-shadow: 0 0 3px #000;
      pointer-events: none; z-index: 10;
    }
  </style>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="game.js"></script>
</head>
<body>
  <div id="game-container">
    <!-- シーンは宣言的に記述。ゲーム本体は textui-game コンポーネントが駆動する。
         テキストは three.js 同様 1枚の CanvasTexture に焼いて quad に貼る方式
         （<a-text> を1ラベルにつき1個は使わない。理由は README 参照）。 -->
    <a-scene embedded background="color: #0b0d16"
             vr-mode-ui="enabled: false"
             device-orientation-permission-ui="enabled: false"
             renderer="antialias: false">
      <a-entity textui-game></a-entity>
    </a-scene>
    <div id="hud">loading...</div>
    <div id="help">+ / - : テキスト数 増減（±100） ・ U : 動的更新 ON/OFF ・ B : 機構切替（CanvasTexture ⇄ GlyphAtlas） ・ R : リセット</div>
  </div>
</body>
</html>
