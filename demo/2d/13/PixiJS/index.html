<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>テーマ13 大量動的テキスト / UI描画 ― PixiJS v8</title>
  <style>
    html, body {
      margin: 0; padding: 0; background: #0b0d16; height: 100%;
      overflow: hidden; font-family: "Consolas", "Courier New", monospace;
    }
    #stage {
      position: relative; width: 960px; height: 540px; margin: 8px auto;
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.6);
      line-height: 0;
    }
    /* HUD は HTML オーバーレイ（キャンバスとは独立）。左上固定。
       Pixi 側のテキスト描画コストと HUD 更新を切り離して計測するため。 */
    #hud {
      background: rgba(10, 16, 22, 0.60); border-radius: 6px; padding: 5px 8px;
      position: absolute; left: 8px; top: 6px; margin: 0;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px; line-height: 1.45; color: #eaf2ff;
      white-space: pre; pointer-events: none;
      text-shadow: 0 0 3px #000, 0 0 3px #000;
    }
    #help {
      position: absolute; left: 0; right: 0; bottom: 6px; text-align: center;
      background: rgba(10, 16, 22, 0.45); border-radius: 6px; padding: 5px 8px; color: #8a99a8;
      font-size: 12px; line-height: 1.4; text-shadow: 0 0 3px #000;
      pointer-events: none; z-index: 10;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="stage">
    <div id="game"></div>
    <pre id="hud">loading...</pre>
    <div id="help">+ / - : テキスト数 増減（±100） ・ U : 動的更新 ON/OFF ・ B : 機構切替（Canvas Text ⇄ BitmapText） ・ R : リセット</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
