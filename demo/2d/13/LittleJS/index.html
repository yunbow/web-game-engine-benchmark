<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>テーマ13 大量動的テキスト / UI 描画 ― LittleJS</title>
  <style>
    html, body {
      margin: 0; padding: 0; background: #0b0d16; height: 100%;
      overflow: hidden; font-family: "Consolas", "Courier New", monospace;
    }
    /* three.js 版と同じ固定 960x540 のステージ。横方向は中央寄せ・上端8px。
       LittleJS は engineInit の rootElement に渡した要素へ canvas を生成し、
       その要素の style.cssText を毎回上書きする(margin:0 等)。stylesheet の
       !important は inline 非!important より強いため、ここで固定値を死守する。 */
    #game-container {
      position: relative !important;
      width: 960px !important; height: 540px !important;
      margin: 8px auto !important;
    }
    /* エンジンは canvas を transform 中央寄せ・ウィンドウ基準でスケールする。
       !important で #game-container いっぱい(960x540・左上原点)に固定上書きする。 */
    #game-container canvas {
      position: absolute !important;
      left: 0 !important; top: 0 !important;
      width: 960px !important; height: 540px !important;
      transform: none !important;
      display: block;
    }
    /* HUD overlay: LittleJS canvas の上に重ねる 2D HTML レイヤ */
    #hud {
      background: rgba(10, 16, 22, 0.60); border-radius: 6px; padding: 5px 8px;
      position: absolute; left: 8px; top: 6px; color: #eaf2ff;
      font: 13px/1.45 "Consolas", "Courier New", monospace;
      text-shadow: 0 0 3px #000, 0 0 3px #000;
      pointer-events: none; white-space: pre; z-index: 10;
    }
    #help {
      position: absolute; left: 0; right: 0; bottom: 6px; text-align: center;
      background: rgba(10, 16, 22, 0.45); border-radius: 6px; padding: 5px 8px; color: #8a99a8;
      font: 12px/1.4 "Consolas", "Courier New", monospace; text-shadow: 0 0 3px #000;
      pointer-events: none; z-index: 10;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="hud">loading...</div>
    <div id="help">
      + / - : テキスト数 増減（±100） ・ U : 動的更新 ON/OFF ・ B : 機構切替（本エンジン未対応） ・ R : リセット
    </div>
  </div>

  <!-- LittleJS engine via CDN. Primary: unpkg. If it fails to load, the
       jsDelivr fallback below is injected. See README for details.
       ※ 素の `unpkg.com/littlejsengine` は現行 package.json の main が ESM(export{})
          のため classic global(engineInit 等)を生やさない。本テーマは classic global
          build を直読みするので、dist/littlejs.min.js を明示指定する(unpkg 主 / jsDelivr 従)。 -->
  <script>
    window.addEventListener('error', function (e) {
      // 主CDN(unpkg)の script タグが失敗したら jsDelivr ミラーへ切替。
      if (e && e.target && e.target.tagName === 'SCRIPT' &&
          /unpkg\.com\/littlejsengine/.test(e.target.src || '')) {
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/littlejsengine/dist/littlejs.min.js';
        s.onload = function () {
          var g = document.createElement('script');
          g.src = 'game.js';
          document.body.appendChild(g);
        };
        document.body.appendChild(s);
      }
    }, true);
  </script>
  <script src="https://unpkg.com/littlejsengine/dist/littlejs.min.js"></script>
  <script>
    // LittleJS(classic global)が確実にロードできた場合のみ game.js を読む(主経路)。
    if (window.engineInit || window.LittleJS) {
      var g = document.createElement('script');
      g.src = 'game.js';
      document.body.appendChild(g);
    }
  </script>
</body>
</html>
