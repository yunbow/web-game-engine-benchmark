<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>テーマ8 パーティクル / 魔法エフェクトデモ ― PixiJS v8</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #05050a;
      color: #e0e0e0;
      font-family: "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
    }
    /* three.js 版と同じ固定 960x540 のステージ。横方向は中央寄せ・上端配置。 */
    #stage {
      position: relative;
      width: 960px;
      height: 540px;
      margin: 0 auto;
      line-height: 0;
      cursor: crosshair;
    }
    /* HUD は HTML オーバーレイ（キャンバスとは独立）。左上固定。
       Pixi の Text を使わないことで、HUD 更新コストを描画計測(FPS)から切り離す。 */
    #hud {
      background: rgba(10, 16, 22, 0.60); border-radius: 6px; padding: 5px 8px;
      position: absolute;
      left: 8px;
      top: 6px;
      margin: 0;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      line-height: 1.45;
      color: #eaf2ff;
      white-space: pre;
      pointer-events: none;
      text-shadow: 0 1px 2px #000;
    }
    #help {
      position: absolute; left: 0; right: 0; bottom: 6px; text-align: center;
      background: rgba(10, 16, 22, 0.45); border-radius: 6px; padding: 5px 8px; color: #8aa0ff;
      font-size: 12px; line-height: 1.4;
      text-shadow: 0 0 3px #000; pointer-events: none; z-index: 10;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="stage">
    <div id="game"></div>
    <pre id="hud">loading...</pre>
    <div id="help">
      クリック=爆発 ・ Space=オート花火 ・ B=ブレンド切替 ・ + / - =目標数 ・ R=リセット ・ マウス移動=トレイル
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
