<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3D T8 PBR + Bloom — A-Frame</title>
<style>
  html, body { margin: 0; height: 100%; background: #1a1f2a; overflow: hidden; }
  #wrap { position: relative; width: 960px; height: 540px; margin: 0 auto; }
  /* a-scene(embedded) のキャンバスを #wrap に収める */
  a-scene, a-scene canvas { display: block; width: 960px !important; height: 540px !important; }
  #hud {
    background: rgba(10, 16, 22, 0.60); border-radius: 6px; padding: 5px 8px;
    position: absolute; left: 8px; top: 6px; color: #eaf2ff;
    font: 13px/1.45 ui-monospace, Menlo, Consolas, monospace;
    text-shadow: 0 1px 2px #000; pointer-events: none; white-space: pre; z-index: 10;
  }
  #help {
    position: absolute; left: 0; right: 0; bottom: 6px; text-align: center;
    background: rgba(10, 16, 22, 0.45); border-radius: 6px; padding: 5px 8px; color: #88a;
    font: 11px/1.4 ui-monospace, monospace; pointer-events: none; z-index: 10;
  }
  #note { position: absolute; left: 8px; bottom: 6px; color: #6f7; font: 11px/1.4 ui-monospace, monospace; pointer-events: none; z-index: 10; }
</style>

<!--
  importmap: 後段のポストプロセス用 addon が `from 'three'` を解決できるようにする。
  A-Frame 1.7.0 同梱 three は super-three@0.173.4。EffectComposer/UnrealBloomPass 等の
  addon は A-Frame の AFRAME.THREE には公開されていないため、同一リビジョンの super-three
  本体＋addon を別途 module として読み、importmap で 'three' をそこへ解決する。
  ※同一バージョン同士なので render target 等の構造は互換。詳細は README 参照。
-->
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/super-three@0.173.4/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/super-three@0.173.4/examples/jsm/"
} }
</script>

<!-- A-Frame 1.7.0（同梱 three を AFRAME.THREE 経由で使う） -->
<script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
<script type="module" src="./game.js"></script>
</head>
<body>
<div id="wrap">
  <!-- 宣言的な <a-scene>。embedded で #wrap(960x540) に収める。トーンマップは ACES Filmic。-->
  <a-scene embedded
           background="color: #1a1f2a"
           renderer="antialias: true; toneMapping: ACESFilmic; exposure: 1.0; colorManagement: true"
           pbrscene>
    <!-- カメラ: look-controls / wasd-controls を無効化し、game.js から camera 本体を手動制御 -->
    <!-- rig(Group) は単位変換(0 0 0)に固定。game.js が getObject3D('camera') を直接周回させる -->
    <a-entity id="rig" camera="fov: 50; near: 0.1; far: 1000"
              look-controls="enabled: false" wasd-controls="enabled: false"
              position="0 0 0"></a-entity>
  </a-scene>

  <div id="hud"></div>
  <div id="help">+ / - : PBR spheres<br>[ / ] : also<br>R: reset</div>
  <div id="note">PBR + post: MeshStandardMaterial + UnrealBloom</div>
</div>
</body>
</html>
