<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3D T9 ナビ群衆 A* — A-Frame</title>
<style>
  html, body { margin: 0; height: 100%; background: #0e131a; overflow: hidden; }
  #wrap { position: relative; width: 960px; height: 540px; margin: 0 auto; }
  /* a-scene(embedded) のキャンバスを #wrap(960x540) に収める */
  a-scene, a-scene canvas { display: block; width: 960px !important; height: 540px !important; }
  #hud {
    background: rgba(10, 16, 22, 0.60); border-radius: 6px; padding: 5px 8px;
    position: absolute; left: 8px; top: 6px; color: #eaf2ff;
    font: 13px/1.45 ui-monospace, Menlo, Consolas, monospace;
    text-shadow: 0 1px 2px #000; pointer-events: none; white-space: pre; z-index: 10;
  }
  #help {
    position: absolute; left: 0; right: 0; bottom: 6px; text-align: center;
    background: rgba(10, 16, 22, 0.45); border-radius: 6px; padding: 5px 8px; color: #88a;
    font: 11px/1.4 ui-monospace, monospace; pointer-events: none; z-index: 10;
  }
  #note { position: absolute; left: 8px; bottom: 6px; color: #6f7; font: 11px/1.4 ui-monospace, monospace; pointer-events: none; z-index: 10; }
</style>
<!-- A-Frame 1.7.0（同梱の three.js を AFRAME.THREE 経由で使う。別途 three は読み込まない） -->
<script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
<script src="./game.js"></script>
</head>
<body>
<div id="wrap">
  <!-- 宣言的な <a-scene>。embedded で #wrap(960x540) 内に収める -->
  <a-scene embedded background="color: #0e131a" renderer="antialias: true" crowd>
    <!-- カメラ: look-controls / wasd-controls を無効化し、game.js から camera 本体を手動制御 -->
    <a-entity id="rig" camera="fov: 55; near: 0.5; far: 600"
              look-controls="enabled: false" wasd-controls="enabled: false"
              position="0 0 0"></a-entity>
  </a-scene>

  <div id="hud"></div>
  <div id="help">+ / - : agents<br>R: reset</div>
  <div id="note">crowd A*: self-written grid A* + instanced agents</div>
</div>
</body>
</html>
