<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3D T3 箱タワー崩し — Babylon.js + Havok</title>
<style>
  html, body { margin: 0; height: 100%; background: #0a0c10; overflow: hidden; }
  #wrap { position: relative; width: 960px; height: 540px; margin: 0 auto; }
  canvas { display: block; width: 960px; height: 540px; outline: none; touch-action: none; }
  #hud {
    background: rgba(10, 16, 22, 0.60); border-radius: 6px; padding: 5px 8px;
    position: absolute; left: 8px; top: 6px; color: #eaf2ff;
    font: 13px/1.45 ui-monospace, Menlo, Consolas, monospace;
    text-shadow: 0 1px 2px #000; pointer-events: none; white-space: pre;
  }
  #help {
    position: absolute; left: 0; right: 0; bottom: 6px; text-align: center;
    background: rgba(10, 16, 22, 0.45); border-radius: 6px; padding: 5px 8px; color: #88a;
    font: 11px/1.4 ui-monospace, monospace; pointer-events: none;
  }
  #note { position: absolute; left: 8px; bottom: 6px; color: #6f7; font: 11px/1.4 ui-monospace, monospace; pointer-events: none; }
</style>
<!-- Babylon.js v8 本体（グローバル BABYLON）と Havok 物理 wasm（グローバル関数 HavokPhysics）。両方を script で読み込む。 -->
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>
</head>
<body>
<div id="wrap">
  <canvas id="renderCanvas" width="960" height="540"></canvas>
  <div id="hud">loading Havok…</div>
  <div id="help">+ / - : boxes (rebuild)<br>Space: fire&nbsp;&nbsp;R: reset</div>
  <div id="note">physics: Havok (WASM)</div>
</div>
<script src="./game.js"></script>
</body>
</html>
